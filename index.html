<!doctype html>
<html lang="en-PH">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#f59e0b" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://fuelwatchph.com" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- Warm critical 3rd-party connections used immediately on load -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin />
		<!-- Non-render-blocking font load (was @import in index.css) -->
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			/>
		</noscript>

		<title>FuelWatch PH - Find Fuel Prices Near You</title>
		<meta
			name="description"
			content="Find, compare, and report fuel prices across the Philippines with community-powered station updates."
		/>
		<meta name="author" content="FuelWatch PH" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="FuelWatch PH" />
		<meta property="og:url" content="https://fuelwatchph.com" />
		<meta
			property="og:image"
			content="https://fuelwatchph.com/logo-horizon.png"
		/>
		<meta property="og:image:width" content="1024" />
		<meta property="og:image:height" content="1024" />
		<meta property="og:image:alt" content="FuelWatch PH" />

		<meta
			property="og:title"
			content="FuelWatch PH - Find Fuel Prices Near You"
		/>
		<meta
			name="twitter:title"
			content="FuelWatch PH - Find Fuel Prices Near You"
		/>
		<meta
			property="og:description"
			content="Find, compare, and report fuel prices across the Philippines with community-powered station updates."
		/>
		<meta
			name="twitter:description"
			content="Find, compare, and report fuel prices across the Philippines with community-powered station updates."
		/>
		<meta name="twitter:card" content="summary_large_image" />
		<meta
			name="twitter:image"
			content="https://fuelwatchph.com/logo-horizon.png"
		/>
		<meta
			name="google-site-verification"
			content="J4NyWtWJ6itnkY1erLc8ufdrrEJlbyJbqAZesVOHV_8"
		/>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"name": "FuelWatch PH",
				"url": "https://fuelwatchph.com",
				"description": "Find, compare, and report fuel prices across the Philippines with community-powered station updates.",
				"potentialAction": {
					"@type": "SearchAction",
					"target": "https://fuelwatchph.com/search?q={search_term_string}",
					"query-input": "required name=search_term_string"
				}
			}
		</script>
	</head>

	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
